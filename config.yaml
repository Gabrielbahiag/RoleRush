filtros:
  palavras_chave: # bate no título + descrição; passa se achar QUALQUER um
    - python
    - machine learning
    - inteligência artificial
    - llm
    - prompt engineering
    - engenharia de prompt
    - engenharia de software
    - software engineer
    - desenvolvedor
  excluir: [] # descarta se aparecer (ex: "senior" caso volte a filtrar por nível)
  senioridade: [] # vazio = qualquer nível (júnior, pleno, sênior)
  remoto: null # não exige remoto: o filtro de localização já libera remotas
  localizacao: # vaga remota passa sempre; presencial/híbrida só se bater aqui
    - brasília
    - brasilia
    - df
    - distrito federal

fontes:
